<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>더웰니스 학습서 | 상세 보기</title>
  <link rel="stylesheet" href="style.css">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="detail-page-body">

  <!-- Minimal Header for Detail Window -->
  <header class="detail-header">
    <div class="header-container">
      <div class="logo-area" onclick="window.close()">
        <span class="brand-main">THE WELLNESS</span>
        <span class="brand-divider">/</span>
        <span class="brand-sub">STUDY HUB</span>
      </div>
      <button class="btn-close-window" onclick="window.close()">
        <i data-lucide="x"></i> 창 닫기
      </button>
    </div>
  </header>

  <!-- Product Detail Page Layout (YourNextStore Inspired) -->
  <main class="detail-main">
    <div class="detail-container" id="detail-loading-box">
      <div class="loader-spinner">로딩 중...</div>
    </div>
    
    <div class="detail-container" id="detail-content-wrapper" style="display: none;">
      <!-- Left Column: Big visual graphic (representing product image) -->
      <div class="detail-left-col">
        <div class="product-large-image" id="detail-graphic-box">
          <div class="large-icon-box">
            <i data-lucide="book-open" id="detail-large-icon"></i>
          </div>
        </div>
        
        <!-- Checklist Box widget (representing shopping options/checkmarks) -->
        <div class="quick-status-widget">
          <h3 class="widget-title">학습 체크리스트</h3>
          <div class="checklist-items" id="detail-checklist-items">
            <!-- Populated dynamically -->
          </div>
          <button class="btn-primary" id="btn-complete-study" onclick="toggleMainStudyComplete()">
            <i data-lucide="check" class="complete-btn-icon"></i>
            <span id="complete-btn-text">학습 완료로 표시</span>
          </button>
        </div>
      </div>
      
      <!-- Right Column: Document Contents & Specifications -->
      <div class="detail-right-col">
        <div class="product-metadata">
          <span class="product-cat-tag" id="detail-category-tag">시술 및 장비</span>
          <h1 class="product-title" id="detail-title-text">써마지 FLX 4세대</h1>
          <p class="product-sub" id="detail-sub-text">고주파 리프팅 및 상담 가이드</p>
        </div>
        
        <!-- Short Concept Box -->
        <div class="product-concept-box">
          <h4 class="small-header">개념 설명</h4>
          <p id="detail-concept-desc">피부 표피는 냉각시켜 보호하고...</p>
        </div>
        
        <!-- Detailed Accordion Sections (Representing Product Details / FAQ) -->
        <div class="product-accordion-wrapper" id="detail-sections-accordion">
          <!-- Rendered dynamically by detail.js -->
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="store-footer">
    <div class="footer-container">
      <div class="footer-left">
        <span class="footer-brand">THE WELLNESS STUDY</span>
        <p class="footer-clinic-details">서울 서초구 신반포로 219 8동 2층 | 대표전화: 02-597-5977</p>
      </div>
      <div class="footer-right">
        <p>&copy; 2026 THE WELLNESS CLINIC. Staff Internal Portal.</p>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="data.js"></script>
  <script src="detail.js"></script>
</body>
</html>
