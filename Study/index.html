<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE WELLNESS | STUDY HUB</title>
  <link rel="stylesheet" href="style.css">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Minimalist Header (YourNextStore Style) -->
  <header class="store-header">
    <div class="header-container">
      <div class="logo-area" onclick="filterCategory('all')">
        <span class="brand-main">THE WELLNESS</span>
        <span class="brand-divider">/</span>
        <span class="brand-sub">STUDY HUB</span>
      </div>
      
      <!-- Minimal Nav Categories -->
      <nav class="store-nav">
        <button class="nav-btn active" data-cat="all" onclick="filterCategory('all')">전체</button>
        <button class="nav-btn" data-cat="treatment" onclick="filterCategory('treatment')">시술 및 장비</button>
        <button class="nav-btn" data-cat="flow" onclick="filterCategory('flow')">데스크 FLOW</button>
        <button class="nav-btn" data-cat="vocab" onclick="filterCategory('vocab')">차팅 & 약어</button>
        <button class="nav-btn" data-cat="cosmetic" onclick="filterCategory('cosmetic')">화장품 단가표</button>
        <button class="nav-btn" data-cat="ot" onclick="filterCategory('ot')">신입 O.T</button>
      </nav>
      
      <!-- Minimalist Search Bar -->
      <div class="search-wrapper">
        <i data-lucide="search" class="search-icon"></i>
        <input type="text" id="study-search" placeholder="학습 자료 검색..." aria-label="검색">
      </div>
    </div>
  </header>

  <!-- Hero Message Banner -->
  <section class="store-hero">
    <div class="hero-container">
      <h1 class="hero-title">더웰니스의원 스태프 필수 교육관</h1>
      <p class="hero-subtitle">실제 원내 공식 교육 PDF 문서를 100% 기반으로 학습 종목을 세분화하여 나열한 정밀 스터디 룸입니다. 클릭 시 새 창에서 세부 학습서가 제공됩니다.</p>
    </div>
  </section>

  <!-- Product/Study Grid System -->
  <main class="store-main">
    <div class="main-container">
      <div class="grid-header">
        <span class="results-count" id="results-count-text">로딩 중...</span>
        <div class="sorting-selector">
          <span>정렬: </span>
          <select id="sort-select" onchange="handleSort()">
            <option value="default">기본 순</option>
            <option value="title">이름 순</option>
          </select>
        </div>
      </div>
      
      <div class="study-grid" id="study-grid-container">
        <!-- Rendered dynamically by app.js -->
      </div>
    </div>
  </main>

  <!-- Simple Minimalist Footer -->
  <footer class="store-footer">
    <div class="footer-container">
      <div class="footer-left">
        <span class="footer-brand">THE WELLNESS STUDY</span>
        <p class="footer-clinic-details">서울 서초구 신반포로 219 8동 2층 (반포역 4번 출구) | 대표전화: 02-597-5977</p>
      </div>
      <div class="footer-right">
        <p>&copy; 2026 THE WELLNESS CLINIC. All rights reserved. Staff Internal Portal.</p>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
